version: "3"

services:
  cek-seo:
    build: .
    ports:
      - "3001:3001"
    env_file:
      - .env
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - cek-seo
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
